# Site Settings
title: "Armando Pinales"
tagline: "Hardware Designer"
description: >-
  Personal portfolio of Armando Pinales — electronics engineer. Building hardware, writing code, making music.
url: "https://armando-jp.github.io"
baseurl: ""

# Author
author:
  name: "Armando Pinales"
  bio: "Hardware Designer"
  location: "California"
  github: "armando-jp"
  linkedin: "armandopinales" 

# Build
markdown: kramdown
highlighter: rouge
permalink: /writing/:title/
timezone: America/Los_Angeles

# Reading Files
include:
  - _pages
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - package.json
  - package-lock.json
  - README.md
  - Rakefile
  - .travis.yml
  - staticman.yml
  - banner.js

# Collections
collections:
  projects:
    output: true
    permalink: /workshop/:path/

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "default-custom"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page-custom"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post-custom"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project-custom"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Sass
sass:
  sass_dir: _sass
  style: compressed
